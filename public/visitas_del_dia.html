<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Calendario y lista de visitas del dia consumidos desde las rutas /api. -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de visitas - INPSASEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="visitas_del_dia.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
</head>

<body>
    <div class="form-container form-container--wide">
        <div class="actions-row">
            <a href="/menu" class="btn-secondary back-btn">Volver al menú</a>
            <button id="reloadBtn" class="btn-secondary back-btn" type="button">Actualizar</button>
        </div>

        <h2>Calendario de visitas</h2>
        <p class="subtitle">Visualiza visitas de hoy y otros días. Haz click sobre una fecha para ver su detalle.</p>

        <div class="form-group" style="margin: 0 auto 24px auto; max-width: 480px;">
            <label for="searchCedulaRif" style="text-align: center; display: block; font-weight: 700; color: #1e3a8a; margin-bottom: 6px;">Filtrar por Cédula / RIF</label>
            <div class="search-inline" style="margin-top: 0;">
                <input type="text" id="searchCedulaRif" placeholder="Ingresa cédula o RIF para filtrar..." />
                <button type="button" id="clearSearchBtn" class="btn-secondary" style="margin-top: 0; padding: 12px 20px; white-space: nowrap;">Limpiar</button>
            </div>
        </div>

        <div id="status" class="status-row">Cargando calendario...</div>
        <div id="errorBox" class="error-box error-box--hidden"></div>

        <div class="calendar-shell">

            <div id="calendar"></div>

            <section class="panel" style="margin-top: 50px;">
                <h3>Detalle por fecha</h3>
                <div id="selectedDate" class="selected-date"></div>
                <div id="emptyBox" class="empty-box empty-box--hidden">No hay visitas para la fecha seleccionada.</div>

                <div id="tableWrapper" class="visits-cards-wrapper table-wrapper--hidden">
                    <div id="visitasCardsContainer" class="visits-cards-container"></div>
                </div>

                <div class="event-tip">Tip: click en un evento para cargar automáticamente su fecha.</div>
            </section>
        </div>
    </div>

    <div id="eventModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="wizardTitle">
        <div class="wizard-modal">
            <div class="wizard-header">
                <h4 id="wizardTitle" class="wizard-title">Detalle de visita</h4>
                <div class="wizard-header__actions">
                    <button id="downloadPdfBtn" class="btn-secondary" type="button" title="Descargar PDF" disabled>Descargar PDF</button>
                    <button id="wizardCloseBtn" class="wizard-close" type="button" aria-label="Cerrar">&times;</button>
                </div>
            </div>
            <div id="wizardContent" class="wizard-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/locales/es.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="visitas_del_dia.js"></script>
</body>
</html>
